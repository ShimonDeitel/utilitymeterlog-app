name: UtilityMeterLog
options:
  bundleIdPrefix: com.shimondeitel.meterlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  UtilityMeterLog:
    type: application
    platform: iOS
    sources:
      - path: UtilityMeterLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.meterlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: UtilityMeterLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  UtilityMeterLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: UtilityMeterLogTests
      - path: UtilityMeterLog.storekit
    dependencies:
      - target: UtilityMeterLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.meterlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  UtilityMeterLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UtilityMeterLogUITests
    dependencies:
      - target: UtilityMeterLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.meterlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  UtilityMeterLog:
    build:
      targets:
        UtilityMeterLog: all
        UtilityMeterLogTests: [test]
        UtilityMeterLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: UtilityMeterLog.storekit
    test:
      config: Debug
      storeKitConfiguration: UtilityMeterLog.storekit
      targets:
        - UtilityMeterLogTests
        - UtilityMeterLogUITests
    archive:
      config: Release
